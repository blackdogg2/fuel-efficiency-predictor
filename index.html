<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Efficiency Predictor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #172033;
      --muted: #5b6578;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --line: #d9e1ec;
      --accent: #c21f32;
      --accent-dark: #8f1524;
      --teal: #1f8a70;
      --blue: #275f96;
      --warning: #b7791f;
      --danger: #9b1c31;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #121a2a 0%, #243149 52%, #331720 100%);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
      gap: 16px;
      align-items: stretch;
      color: #ffffff;
      margin-bottom: 16px;
    }

    .intro,
    .metric-strip,
    .main-card,
    .model-card {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.28);
    }

    .intro {
      background: rgba(255, 255, 255, 0.08);
      padding: 24px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      background: rgba(194, 31, 50, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #ffd8dd;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 760px;
      margin: 0;
      color: #e7edf6;
      line-height: 1.6;
      font-size: 16px;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.18);
    }

    .hero-metric {
